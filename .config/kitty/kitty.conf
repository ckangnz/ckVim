# BEGIN_KITTY_FONTS
font_family      family='FiraCode Nerd Font Mono' postscript_name=FiraCodeNFM-Reg
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 13.0
modify_font cell_height 130%
modify_font baseline 0

# Explicitly map Nerd Font symbol ranges to the builtin Nerd Font Mono so glyphs render at full cell size
# Source: https://sw.kovidgoyal.net/kitty/faq/
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# Change font size keybindings
map ctrl+shift+plus change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+equal change_font_size all 0
map cmd+plus change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+equal change_font_size all 0

# Cursor
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# Window Appearance
hide_window_decorations yes
macos_titlebar_color system
macos_option_as_alt yes
macos_hide_from_tasks no

## Background
background_opacity 0.98
background_blur 15
dynamic_background_opacity yes

## Border & Padding
window_padding_width 4 4 4 4
draw_minimal_borders yes
draw_window_borders_for_single_window no

# KEY MAPPINGS
clear_all_shortcuts yes

# Window & Tabs
map ctrl+shift+n new_os_window
map ctrl+shift+w close_window
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+right move_tab_forward
map ctrl+shift+left move_tab_backward
map ctrl+shift+r set_tab_title
map cmd+n new_os_window

map cmd+t new_tab
map cmd+w close_window
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+shift+. move_tab_forward
map cmd+shift+, move_tab_backward
map cmd+shift+r set_tab_title

# Edit config file
map ctrl+shift+f2 edit_config_file
map cmd+, edit_config_file

# Copy Paste
map kitty_mod+c copy_to_clipboard
map cmd+c copy_or_noop
map kitty_mod+v paste_from_clipboard
map cmd+v       paste_from_clipboard
clipboard_control write-clipboard read-clipboard write-primary read-primary

# Reload config
map ctrl+cmd+,   load_config_file

# Quit Kitty
map cmd+q quit

# Open kitty shell
map ctrl+shift+escape kitty_shell window

open_url_with default
map ctrl+shift+e open_url_with_hints

# BEGIN_KITTY_THEME
# One Dark
include current-theme.conf
# END_KITTY_THEME


